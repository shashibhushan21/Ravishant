<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanned Result</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="resultContainer" class="result-card">
        <div class="result-header">
            <h2 style="color: var(--primary); margin-bottom: 8px;">Scanned Details</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Information retrieved from QR Code</p>
        </div>
        <div id="resultContent">
            <!-- Data rows will be injected here -->
        </div>
        <div style="text-align: center; margin-top: 32px;">
            <button onclick="window.history.back()" class="btn-secondary" style="margin: 0 auto; width: auto;">Back to
                Generator</button>
        </div>
    </div>

    <script src="result.js"></script>
</body>

</html>
